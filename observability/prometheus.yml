# observability/prometheus.yml
# Local Prometheus configuration — scrapes all three microservices

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: local

scrape_configs:

  - job_name: 'payments-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['payments-service:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'gateway-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['gateway-service:3000']

  - job_name: 'data-processing-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['data-processing-service:5000']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
