# observability/grafana/datasources/prometheus.yaml
# Auto-provisioned Grafana datasource — no manual setup needed.
# Mounted into the Grafana container via docker-compose volume.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: POST
