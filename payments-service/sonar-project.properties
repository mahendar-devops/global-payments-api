# SonarQube project configuration — payments-service
# These properties are used when running: mvn sonar:sonar
# The sonar.login token is injected by Jenkins from the credentials store.

sonar.projectKey=payments-service
sonar.projectName=Payments Service
sonar.projectVersion=1.0.0

# Source and test paths
sonar.sources=src/main/java
sonar.tests=src/test/java

# JaCoCo coverage report — generated by mvn verify
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclude generated code and config from analysis
sonar.exclusions=\
  **/model/enums/**,\
  **/PaymentsServiceApplication.java,\
  **/config/OpenApiConfig.java

# Test report paths for SonarQube to display test results
sonar.junit.reportPaths=target/surefire-reports

# Java version
sonar.java.source=17
sonar.java.target=17

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate — enforced in Jenkinsfile via -Dsonar.qualitygate.wait=true
# Gate must pass (coverage >= 80%, no new Critical issues) for build to proceed
