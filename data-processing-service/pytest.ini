[pytest]
testpaths         = tests
python_files      = test_*.py
python_classes    = Test*
python_functions  = test_*

addopts =
    --cov=app
    --cov-report=xml:coverage.xml
    --cov-report=term-missing
    --cov-fail-under=80
    -v

env =
    FLASK_ENV=testing
    DATABASE_URL=sqlite:///:memory:
