# SonarQube Project Configuration — data-processing-service

sonar.projectKey=data-processing-service
sonar.projectName=Data Processing Service
sonar.projectVersion=1.0.0

# Source and test
sonar.sources=app
sonar.tests=tests
sonar.test.inclusions=tests/test_*.py

# Coverage — generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=migrations/**,**/__pycache__/**,**/alembic/**

sonar.qualitygate.wait=true
sonar.language=python
sonar.sourceEncoding=UTF-8
