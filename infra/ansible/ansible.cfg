# infra/ansible/ansible.cfg
#
# Project-level Ansible configuration.
# Takes precedence over /etc/ansible/ansible.cfg for this repo.
# Run: ansible-playbook -i inventory/aws_ec2.yml site.yml

[defaults]
# Inventory — AWS EC2 dynamic inventory plugin
inventory           = inventory/aws_ec2.yml

# SSH settings
remote_user         = ec2-user
private_key_file    = ~/.ssh/payments-devops.pem

# Roles path (relative to this file)
roles_path          = roles

# Output verbosity (0=minimal, 4=debug)
verbosity           = 1

# Performance
forks               = 10        # Parallel connections
pipelining          = True      # Reduce SSH operations (faster)
gathering           = smart     # Cache facts; only re-gather if stale
fact_caching        = jsonfile
fact_caching_connection = /tmp/ansible-facts-cache
fact_caching_timeout    = 3600  # 1 hour

# Retry failed hosts (creates a .retry file)
retry_files_enabled = True
retry_files_save_path = /tmp/ansible-retries

# Logging (optional — useful in CI/CD)
# log_path = /var/log/ansible.log

# Don't create world-readable temporary files
allow_world_readable_tmpfiles = False

[privilege_escalation]
become              = True
become_method       = sudo
become_user         = root
become_ask_pass     = False

[ssh_connection]
ssh_args            = -C -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
control_path_dir    = /tmp/.ansible/cp
control_path        = %(directory)s/%%h-%%r

[inventory]
# Warn about deprecated features
deprecation_warnings = True
