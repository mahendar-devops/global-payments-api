---
# infra/ansible/roles/linux-hardening/tasks/main.yml
# CIS Benchmark Level 1 — Amazon Linux 2 / RHEL 8
# Broken into tagged sections so individual controls can be run selectively.

# ── 1. System Updates ──────────────────────────────────────────────
- name: Apply all security updates
  ansible.builtin.yum:
    name: "*"
    state: latest
    security: true
    update_cache: true
  tags: [packages, updates, security]
  notify: Restart auditd

- name: Remove unnecessary packages
  ansible.builtin.yum:
    name: "{{ packages_to_remove }}"
    state: absent
  tags: [packages, security]

- name: Install required security tools
  ansible.builtin.yum:
    name:
      - aide           # Intrusion detection (file integrity monitoring)
      - audit          # auditd daemon
      - fail2ban       # Brute-force protection
      - firewalld      # Host-based firewall
      - rsyslog        # Centralised logging
      - openssl        # TLS tools
      - curl
    state: present
  tags: [packages]

# ── 2. SSH Hardening ──────────────────────────────────────────────
- name: Configure SSH — apply hardened settings
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
    backup: true
  loop:
    - { regexp: '^#?PermitRootLogin',         line: "PermitRootLogin {{ ssh_permit_root_login }}" }
    - { regexp: '^#?PasswordAuthentication',  line: "PasswordAuthentication {{ ssh_password_authentication }}" }
    - { regexp: '^#?X11Forwarding',           line: "X11Forwarding {{ ssh_x11_forwarding }}" }
    - { regexp: '^#?MaxAuthTries',             line: "MaxAuthTries {{ ssh_max_auth_tries }}" }
    - { regexp: '^#?Protocol',                line: "Protocol 2" }
    - { regexp: '^#?LogLevel',                line: "LogLevel {{ ssh_log_level }}" }
    - { regexp: '^#?ClientAliveInterval',     line: "ClientAliveInterval {{ ssh_client_alive_interval }}" }
    - { regexp: '^#?ClientAliveCountMax',     line: "ClientAliveCountMax {{ ssh_client_alive_count_max }}" }
    - { regexp: '^#?PermitEmptyPasswords',    line: "PermitEmptyPasswords no" }
    - { regexp: '^#?IgnoreRhosts',            line: "IgnoreRhosts yes" }
    - { regexp: '^#?HostbasedAuthentication', line: "HostbasedAuthentication no" }
    - { regexp: '^#?UsePAM',                  line: "UsePAM yes" }
    - { regexp: '^#?PrintLastLog',            line: "PrintLastLog yes" }    # Audit: show last login
    - { regexp: '^#?Banner',                  line: "Banner /etc/issue.net" }
    - { regexp: '^#?LoginGraceTime',          line: "LoginGraceTime 60" }
  notify: Restart SSH
  tags: [ssh, security]

- name: SSH — restrict to allowed users only
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?AllowUsers"
    line: "AllowUsers {{ ssh_allowed_users | join(' ') }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart SSH
  tags: [ssh, security]

- name: SSH — enforce strong ciphers
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?Ciphers"
    line: "Ciphers {{ ssh_ciphers | join(',') }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart SSH
  tags: [ssh, security]

- name: SSH — enforce strong MACs
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?MACs"
    line: "MACs {{ ssh_macs | join(',') }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart SSH
  tags: [ssh, security]

- name: Deploy SSH warning banner
  ansible.builtin.copy:
    dest: /etc/issue.net
    content: |
      ┌──────────────────────────────────────────────────────────────┐
      │  AUTHORIZED ACCESS ONLY — GLOBAL PAYMENTS API INFRASTRUCTURE │
      │  Unauthorized access is prohibited and will be prosecuted.   │
      │  All sessions are monitored and logged.                      │
      └──────────────────────────────────────────────────────────────┘
    mode: "0644"
    owner: root
    group: root
  tags: [ssh, security]

# ── 3. Firewall ───────────────────────────────────────────────────
- name: Enable and start firewalld
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: true
  tags: [firewall, security]

- name: Open only required TCP ports
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  loop: "{{ firewall_allowed_tcp_ports }}"
  tags: [firewall, security]

- name: Set default zone to drop (deny-by-default)
  ansible.builtin.command: firewall-cmd --set-default-zone=drop
  changed_when: false
  tags: [firewall, security]

# ── 4. Kernel Hardening (sysctl) ─────────────────────────────────
- name: Apply hardened kernel parameters
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value | string }}"
    sysctl_set: true
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-payments-hardening.conf
  loop: "{{ sysctl_settings | dict2items }}"
  tags: [kernel, security]

# ── 5. auditd — Audit Logging ────────────────────────────────────
- name: Configure auditd settings
  ansible.builtin.template:
    src: auditd.conf.j2
    dest: /etc/audit/auditd.conf
    mode: "0640"
    owner: root
    group: root
    validate: "/sbin/auditctl -f %s"
  notify: Restart auditd
  tags: [audit, compliance]

- name: Deploy auditd rules (CIS Level 1)
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/99-payments-hardening.rules
    mode: "0640"
    owner: root
    group: root
    content: |
      ## CIS Benchmark Audit Rules — Global Payments API
      ## Managed by Ansible — do not edit manually

      # Delete existing rules
      -D
      # Set buffer size (increase for busy systems)
      -b 8192
      # Failure mode: 1=log, 2=panic
      -f 1

      # -- Identity changes --
      -w /etc/passwd   -p wa -k identity
      -w /etc/shadow   -p wa -k identity
      -w /etc/group    -p wa -k identity
      -w /etc/gshadow  -p wa -k identity
      -w /etc/sudoers  -p wa -k sudoers
      -w /etc/sudoers.d/ -p wa -k sudoers

      # -- Privileged command usage --
      -a always,exit -F arch=b64 -S execve -F euid=0 -k root_commands
      -a always,exit -F arch=b32 -S execve -F euid=0 -k root_commands

      # -- File deletion --
      -a always,exit -F arch=b64 -S unlink -S unlinkat -S rename -S renameat -k file_deletion
      -a always,exit -F arch=b32 -S unlink -S unlinkat -S rename -S renameat -k file_deletion

      # -- Network configuration changes --
      -a always,exit -F arch=b64 -S sethostname -S setdomainname -k network_mods
      -w /etc/hosts -p wa -k network_mods
      -w /etc/sysconfig/network -p wa -k network_mods

      # -- SSH key usage --
      -w /etc/ssh/sshd_config -p wa -k sshd_config

      # -- Kernel module loading --
      -w /sbin/insmod  -p x -k kernel_modules
      -w /sbin/rmmod   -p x -k kernel_modules
      -w /sbin/modprobe -p x -k kernel_modules
      -a always,exit -F arch=b64 -S init_module -S delete_module -k kernel_modules

      # -- Cron and scheduled jobs --
      -w /etc/cron.allow -p wa -k cron
      -w /etc/cron.deny  -p wa -k cron
      -w /etc/crontab    -p wa -k cron
      -w /etc/cron.d/    -p wa -k cron

      # Make rules immutable (require reboot to change)
      -e 2
  notify: Restart auditd
  tags: [audit, compliance]

- name: Enable and start auditd
  ansible.builtin.systemd:
    name: auditd
    state: started
    enabled: true
  tags: [audit, compliance]

# ── 6. Fail2Ban ───────────────────────────────────────────────────
- name: Configure fail2ban for SSH protection
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    mode: "0644"
    content: |
      [DEFAULT]
      bantime  = {{ fail2ban_bantime }}
      findtime = {{ fail2ban_findtime }}
      maxretry = {{ fail2ban_maxretry }}
      backend  = systemd
      ignoreip = 127.0.0.1/8 ::1 10.0.0.0/8  # VPC CIDR — don't ban internal traffic

      [sshd]
      enabled  = true
      port     = {{ ssh_port }}
      filter   = sshd
      logpath  = %(sshd_log)s
  notify: Restart fail2ban
  tags: [fail2ban, security]

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: true
  tags: [fail2ban, security]

# ── 7. Disable Unnecessary Services ──────────────────────────────
- name: Disable and mask insecure services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop:
    - avahi-daemon
    - cups
    - dhcpd
    - slapd
    - nfs
    - rpcbind
    - named
    - vsftpd
    - httpd
    - dovecot
    - smb
    - squid
    - snmpd
  ignore_errors: true   # Service may not exist on a minimal AMI
  tags: [services, security]

# ── 8. AIDE — File Integrity Monitoring ──────────────────────────
- name: Initialise AIDE database (first run — takes several minutes)
  ansible.builtin.command: aide --init
  args:
    creates: /var/lib/aide/aide.db.new.gz
  register: aide_init
  tags: [aide, compliance]

- name: Move AIDE database into place
  ansible.builtin.command: mv /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz
  when: aide_init.changed
  tags: [aide, compliance]

- name: Schedule daily AIDE integrity check via cron
  ansible.builtin.cron:
    name: "AIDE integrity check"
    minute: "30"
    hour: "3"           # 3:30 AM — low traffic window
    job: "/usr/sbin/aide --check 2>&1 | logger -t aide"
    user: root
  tags: [aide, compliance]

# ── 9. Password and Account Policies ─────────────────────────────
- name: Set password quality requirements
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: '^#?minlen',    line: "minlen = 14" }
    - { regexp: '^#?minclass',  line: "minclass = 4" }
    - { regexp: '^#?maxrepeat', line: "maxrepeat = 3" }
    - { regexp: '^#?dcredit',   line: "dcredit = -1" }
    - { regexp: '^#?ucredit',   line: "ucredit = -1" }
    - { regexp: '^#?ocredit',   line: "ocredit = -1" }
    - { regexp: '^#?lcredit',   line: "lcredit = -1" }
  tags: [password, security]

- name: Set password expiry policy
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: '^PASS_MAX_DAYS', line: "PASS_MAX_DAYS 90" }
    - { regexp: '^PASS_MIN_DAYS', line: "PASS_MIN_DAYS 7" }
    - { regexp: '^PASS_WARN_AGE', line: "PASS_WARN_AGE 14" }
  tags: [password, security]

# ── 10. Filesystem Hardening ──────────────────────────────────────
- name: Disable unused filesystems
  ansible.builtin.copy:
    dest: /etc/modprobe.d/payments-blacklist.conf
    mode: "0644"
    content: |
      # Disable unused/insecure filesystem modules
      install cramfs  /bin/true
      install freevxfs /bin/true
      install jffs2   /bin/true
      install hfs     /bin/true
      install hfsplus /bin/true
      install udf     /bin/true
      install vfat    /bin/true   # Comment out if USB boot needed
  tags: [filesystem, security]

# ── 11. Final: Record hardening completion ────────────────────────
- name: Write hardening completion marker
  ansible.builtin.copy:
    dest: /etc/payments-hardening.conf
    mode: "0444"    # Read-only
    owner: root
    group: root
    content: |
      # This file is managed by Ansible — do not edit
      HARDENING_BENCHMARK="{{ hardening_benchmark }}"
      HARDENING_LEVEL="{{ hardening_level }}"
      HARDENING_DATE="{{ ansible_date_time.iso8601 }}"
      HARDENING_ANSIBLE_VERSION="{{ ansible_version.full }}"
      HARDENING_HOST="{{ inventory_hostname }}"
  tags: [compliance]
