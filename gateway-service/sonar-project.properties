# SonarQube Project Configuration — gateway-service
# Used by: mvn sonar:sonar (via Jenkins pipeline)

sonar.projectKey=gateway-service
sonar.projectName=Gateway Service
sonar.projectVersion=1.0.0

# Source and test paths
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Coverage — generated by Jest with --coverage flag
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions — don't scan generated or config-only files
sonar.exclusions=node_modules/**,coverage/**,k8s/**

# Quality Gate thresholds (enforce in Jenkins with sonar.qualitygate.wait=true)
# New code: coverage >= 80%, no new Critical/Blocker issues
sonar.qualitygate.wait=true

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8
