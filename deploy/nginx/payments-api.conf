# deploy/nginx/payments-api.conf
# Copy to: /etc/nginx/conf.d/payments-api.conf on the app server
# Edit: replace api.YOURDOMAIN.com with your actual domain
#
# Run AFTER certbot obtains the SSL certificate:
#   sudo certbot --nginx -d api.YOURDOMAIN.com --non-interactive --agree-tos -m your@email.com

# Rate limit zone — 100 requests per IP per minute
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

# ── HTTP → redirect to HTTPS ──────────────────────────────────────
server {
    listen 80;
    server_name api.YOURDOMAIN.com;

    # Required for Let's Encrypt renewal verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main API server ───────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.YOURDOMAIN.com;

    # SSL certificates — filled in by certbot
    ssl_certificate     /etc/letsencrypt/live/api.YOURDOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.YOURDOMAIN.com/privkey.pem;

    # Modern SSL configuration (TLS 1.2 and 1.3 only)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security Headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── API Routes → Gateway Service ─────────────────────────────
    location /api/v1/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Return 503 if backend is down
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
    }

    # ── Health Check (public, no rate limit) ─────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_set_header Host $host;
        access_log off;   # Don't log health check traffic
    }

    # ── Block access to internal/admin paths ─────────────────────
    location ~* ^/(actuator|internal|admin|debug|console) {
        return 403;
    }

    # ── Block common attack paths ─────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 404;
    }

    # ── Error pages ───────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"code":"RATE_LIMIT_EXCEEDED","message":"Too many requests. Please slow down."}';
    }

    error_page 502 503 504 /50x.json;
    location = /50x.json {
        default_type application/json;
        return 503 '{"code":"SERVICE_UNAVAILABLE","message":"Service temporarily unavailable. Please try again."}';
    }
}
