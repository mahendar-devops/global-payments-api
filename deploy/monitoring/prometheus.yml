# deploy/monitoring/prometheus.yml
# Prometheus scrape configuration for the App Server
# Placed at: ~/global-payments-api/monitoring/prometheus.yml

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    instance:    app-server

scrape_configs:

  - job_name: 'payments-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['payments-service:8080']
        labels:
          service: payments-service
          language: java

  - job_name: 'gateway-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['gateway-service:3000']
        labels:
          service: gateway-service
          language: nodejs

  - job_name: 'data-processing-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['data-processing-service:5000']
        labels:
          service: data-processing-service
          language: python

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          service: host-metrics
