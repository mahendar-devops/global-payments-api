# deploy/docker-compose.prod.yml
#
# Production Docker Compose for the App Server EC2 instance.
# This is DIFFERENT from the root docker-compose.yml (dev/local).
#
# USAGE (on the app server, after SSH):
#   cd ~/global-payments-api
#   cp /path/to/docker-compose.prod.yml docker-compose.yml
#   cp /path/to/.env.prod .env
#   docker-compose up -d
#
# IMPORTANT: Edit .env.prod with real secrets before starting.
# Never commit .env to GitHub.

version: "3.9"

networks:
  payments-net:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  zookeeper_data:
  kafka_data:

services:

  # ── Infrastructure ─────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    networks: [payments-net]
    environment:
      POSTGRES_DB:       payments
      POSTGRES_USER:     payments_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments_user -d payments"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: unless-stopped
    networks: [payments-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: unless-stopped
    networks: [payments-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID:                         1
      KAFKA_ZOOKEEPER_CONNECT:                 zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:              PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:    PLAINTEXT:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:         "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:  1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Microservices ──────────────────────────────────────────────

  payments-service:
    image: payments-service:latest
    container_name: payments-service
    restart: unless-stopped
    networks: [payments-net]
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: production
      DB_URL:                 jdbc:postgresql://postgres:5432/payments
      DB_USERNAME:            payments_user
      DB_PASSWORD:            ${DB_PASSWORD}
      JWT_SECRET:             ${JWT_SECRET}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ENVIRONMENT:            production
      LOG_LEVEL:              INFO
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s    # Spring Boot needs time to start on t2.micro

  gateway-service:
    image: gateway-service:latest
    container_name: gateway-service
    restart: unless-stopped
    networks: [payments-net]
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:              production
      PORT:                  3000
      PAYMENTS_SERVICE_URL:  http://payments-service:8080
      JWT_SECRET:            ${JWT_SECRET}
      ALLOWED_ORIGINS:       https://${DOMAIN_NAME}
      LOG_LEVEL:             info
    depends_on:
      payments-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  data-processing-service:
    image: data-processing-service:latest
    container_name: data-processing-service
    restart: unless-stopped
    networks: [payments-net]
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV:               production
      PORT:                    5000
      DATABASE_URL:            postgresql://payments_user:${DB_PASSWORD}@postgres:5432/payments
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AWS_REGION:              eu-west-2
      S3_REPORTS_BUCKET:       ${S3_REPORTS_BUCKET}
      ENVIRONMENT:             production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health/liveness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Monitoring ────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: prometheus
    restart: unless-stopped
    networks: [payments-net]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.3.0
    container_name: grafana
    restart: unless-stopped
    networks: [payments-net]
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         https://${DOMAIN_NAME}/grafana
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
